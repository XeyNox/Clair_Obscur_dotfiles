source = ~/.config/hypr/colors.conf

background {
    monitor =
    path = ~/Pictures/wallpapers/wallpaper_clair_obscur.jpg
    blur_passes = 3
    blur_size = 8
    brightness = 0.4
    vibrancy = 0.1
}

input-field {
    monitor =
    size = 280, 56
    outline_thickness = 2
    dots_size = 0.25
    dots_spacing = 0.3
    dots_center = true
    outer_color = $accent_gold_dim
    inner_color = $bg_secondary
    font_color = $text_primary
    check_color = $accent_gold
    fail_color = $accent_red
    fail_text = <i>Mot de passe incorrect ($ATTEMPTS)</i>
    capslock_color = $accent_gold
    fade_on_empty = false
    placeholder_text = <i>Mot de passe…</i>
    position = 0, -100
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:1000] echo "$(date +"%H:%M")"
    color = $text_primary
    font_size = 72
    font_family = Cinzel
    position = 0, 150
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:3600000] echo "$(date +"%A %d %B")"
    color = $text_muted
    font_size = 16
    font_family = Cormorant Garamond
    position = 0, 80
    halign = center
    valign = center
}

# Salutation selon l'heure : Bonjour / Bon après-midi / Bonsoir / Bonne nuit.
label {
    monitor =
    text = cmd[update:60000] ~/.config/hypr/lock-labels.sh greeting
    color = $accent_gold
    font_size = 26
    font_family = Cormorant Garamond
    position = 0, 270
    halign = center
    valign = center
}

# Signature Belle Époque, en bas de l'écran.
label {
    monitor =
    text = Clair Obscur · Expédition 33
    color = $text_muted
    font_size = 14
    font_family = Cinzel
    position = 0, 50
    halign = center
    valign = bottom
}

# Statut batterie, coin supérieur droit.
label {
    monitor =
    text = cmd[update:30000] ~/.config/hypr/lock-labels.sh battery
    color = $text_muted
    font_size = 15
    font_family = Cormorant Garamond
    position = -40, -30
    halign = right
    valign = top
}
