source = ~/.config/hypr/colors.conf

background {
    monitor =
    path = ~/Pictures/wallpaper_clair_obscur.jpg
    blur_passes = 3
    blur_size = 8
    brightness = 0.4
    vibrancy = 0.1
}

input-field {
    monitor =
    size = 280, 56
    outline_thickness = 2
    dots_size = 0.25
    dots_spacing = 0.3
    dots_center = true
    outer_color = $accent_gold_dim
    inner_color = $bg_secondary
    font_color = $text_primary
    check_color = $accent_gold
    fail_color = $accent_red
    fade_on_empty = false
    placeholder_text = <i>Mot de passe…</i>
    position = 0, -100
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:1000] echo "$(date +"%H:%M")"
    color = $text_primary
    font_size = 72
    font_family = Cinzel
    position = 0, 150
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:3600000] echo "$(date +"%A %d %B")"
    color = $text_muted
    font_size = 16
    font_family = Cormorant Garamond
    position = 0, 80
    halign = center
    valign = center
}
